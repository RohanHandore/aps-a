<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Payments — Service Architecture Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --surface: #16161a;
  --surface2: #1e1e24;
  --surface3: #26262e;
  --border: #2a2a34;
  --border-hover: #3a3a48;
  --text: #e8e6e3;
  --text2: #9a9a9a;
  --text3: #666;
  --t1: #a78bfa;
  --t1bg: rgba(167,139,250,.12);
  --t1glow: rgba(167,139,250,.25);
  --t2: #34d399;
  --t2bg: rgba(52,211,153,.10);
  --t2glow: rgba(52,211,153,.2);
  --t3: #6b7280;
  --t3bg: rgba(107,114,128,.10);
  --t3glow: rgba(107,114,128,.15);
  --r1: #f87171; --r2: #fbbf24; --r3: #6b7280;
  --accent: #60a5fa;
  --accent-bg: rgba(96,165,250,.1);
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }
::selection { background: rgba(167,139,250,.3); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.locked .app { display: none; }
.locked { overflow: hidden; }
.gate {
  position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
  background: rgba(12,12,15,.78);
  backdrop-filter: blur(10px);
  z-index: 9999;
  padding: 24px;
}
.locked .gate { display: flex; }
.gate-card {
  width: min(520px, 100%);
  background: linear-gradient(180deg, rgba(22,22,26,.92), rgba(22,22,26,.82));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 30px 90px rgba(0,0,0,.55);
}
.gate-title { font-size: 16px; font-weight: 700; letter-spacing: -.2px; margin-bottom: 8px; }
.gate-sub { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
.gate-mono { font-family: var(--mono); color: var(--text); }
.gate-row { display: flex; gap: 10px; }
.gate-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
}
.gate-input:focus { border-color: var(--t1); box-shadow: 0 0 0 3px var(--t1glow); }
.gate-btn {
  background: var(--t1bg);
  border: 1px solid rgba(167,139,250,.35);
  color: var(--t1);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.gate-btn:hover { transform: translateY(-1px); border-color: rgba(167,139,250,.6); }
.gate-error { margin-top: 10px; font-size: 12px; color: #fca5a5; min-height: 16px; }

.app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr; height: 100vh; }

header {
  grid-column: 1/-1; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); background: var(--surface); z-index: 10;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--t1), var(--accent)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; }
.logo h1 { font-size: 16px; font-weight: 600; letter-spacing: -.3px; }
.logo h1 span { color: var(--text2); font-weight: 400; }
.header-controls { display: flex; gap: 8px; align-items: center; }
.search-box {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px;
  color: var(--text); font-family: var(--font); width: 240px; outline: none; transition: border-color .2s;
}
.search-box:focus { border-color: var(--t1); }
.search-box::placeholder { color: var(--text3); }
.filter-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px;
  color: var(--text2); cursor: pointer; font-family: var(--font); transition: all .15s; user-select: none;
}
.filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
.filter-btn.active { border-color: var(--t1); color: var(--t1); background: var(--t1bg); }

.sidebar {
  border-right: 1px solid var(--border); background: var(--surface); overflow-y: auto; padding: 0;
}
.sidebar-section { border-bottom: 1px solid var(--border); }
.sidebar-section-header {
  padding: 12px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px;
  color: var(--text3); cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  user-select: none; transition: color .15s; position: sticky; top: 0; background: var(--surface); z-index: 2;
}
.sidebar-section-header:hover { color: var(--text2); }
.sidebar-section-header .chevron { transition: transform .2s; font-size: 10px; }
.sidebar-section-header .chevron.collapsed { transform: rotate(-90deg); }
.sidebar-section-header .count { background: var(--surface2); padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; margin-left: 6px; }
.sidebar-list { padding: 0 8px 8px; }
.sidebar-item {
  padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center;
  gap: 8px; transition: all .12s; position: relative; line-height: 1.3;
}
.sidebar-item:hover { background: var(--surface2); }
.sidebar-item.active { background: var(--t1bg); }
.sidebar-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sidebar-item .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-item .tier-badge {
  font-size: 9px; font-weight: 600; font-family: var(--mono); padding: 1px 5px; border-radius: 4px;
  flex-shrink: 0; letter-spacing: .3px;
}
.sidebar-item .conn-count { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.hidden { display: none !important; }

.main { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

.detail-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  animation: fadeUp .25s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.detail-header {
  padding: 20px 24px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-title { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
.detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.badge-pill {
  font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px;
}
.detail-desc { padding: 16px 24px; font-size: 14px; color: var(--text2); line-height: 1.6; border-bottom: 1px solid var(--border); }

.connections-grid { padding: 16px 24px 20px; display: flex; flex-direction: column; gap: 16px; }
.conn-group-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text3);
  display: flex; align-items: center; gap: 8px;
}
.conn-group-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.conn-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.conn-chip {
  font-size: 12px; padding: 6px 12px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); transition: all .15s; display: flex; align-items: center; gap: 6px;
}
.conn-chip:hover { border-color: var(--t1); background: var(--t1bg); transform: translateY(-1px); }
.conn-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.flow-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px;
}
.flow-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.flow-steps { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.flow-step {
  font-size: 12px; padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all .15s;
}
.flow-step:hover { transform: translateY(-1px); }
.flow-arrow { color: var(--text3); font-size: 14px; }

.welcome-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1;
  text-align: center; color: var(--text3); gap: 12px; padding: 60px 20px;
}
.welcome-state .big-icon { font-size: 48px; opacity: .15; margin-bottom: 8px; }
.welcome-state h2 { font-size: 18px; font-weight: 500; color: var(--text2); }
.welcome-state p { font-size: 13px; max-width: 380px; line-height: 1.6; }

.stats-bar {
  display: flex; gap: 6px; flex-wrap: wrap; padding: 0 24px 16px;
}
.stat {
  background: var(--surface2); border-radius: 8px; padding: 10px 14px; font-size: 20px; font-weight: 700;
  font-family: var(--mono); display: flex; flex-direction: column; gap: 2px; min-width: 80px;
}
.stat small { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; font-family: var(--font); }

.network-canvas-wrap {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: relative;
}
.network-canvas-wrap h3 {
  padding: 14px 20px; font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
#networkCanvas { width: 100%; display: block; cursor: grab; }
#networkCanvas:active { cursor: grabbing; }
.canvas-controls {
  position: absolute; bottom: 12px; right: 12px; display: flex; gap: 4px;
}
.canvas-ctrl-btn {
  width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.canvas-ctrl-btn:hover { border-color: var(--border-hover); color: var(--text); }

@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { max-height: 40vh; }
  .search-box { width: 140px; }
}
</style>
</head>
<body class="locked">
<div class="gate" id="gate" aria-hidden="false">
  <div class="gate-card" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
    <div class="gate-title" id="gateTitle">Enter password</div>
    <div class="gate-sub">Enter password to continue.</div>
    <div class="gate-row">
      <input class="gate-input" id="gatePassword" type="password" placeholder="Password" autocomplete="current-password" />
      <button class="gate-btn" id="gateSubmit" type="button">Unlock</button>
    </div>
    <div class="gate-error" id="gateError" aria-live="polite"></div>
  </div>
</div>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">GP</div>
      <h1>Service architecture <span>— Global Payments</span></h1>
    </div>
    <div class="header-controls">
      <input class="search-box" id="search" type="text" placeholder="Search services…" autocomplete="off">
      <button class="filter-btn" data-tier="1" onclick="toggleFilter(1)">Tier 1</button>
      <button class="filter-btn" data-tier="2" onclick="toggleFilter(2)">Tier 2</button>
      <button class="filter-btn" data-tier="3" onclick="toggleFilter(3)">Tier 3</button>
    </div>
  </header>

  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<script>
function expectedPasswordForToday() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return `rohan${dd}${mm}`;
}

function unlockIfCorrectPassword() {
  const input = document.getElementById('gatePassword');
  const error = document.getElementById('gateError');
  const entered = (input?.value ?? '').trim();

  if (entered !== expectedPasswordForToday()) {
    error.textContent = 'Incorrect password.';
    input?.select();
    return false;
  }

  document.body.classList.remove('locked');
  document.getElementById('gate')?.setAttribute('aria-hidden', 'true');
  error.textContent = '';
  input.value = '';
  return true;
}

function initGate() {
  const btn = document.getElementById('gateSubmit');
  const input = document.getElementById('gatePassword');

  btn?.addEventListener('click', unlockIfCorrectPassword);
  input?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') unlockIfCorrectPassword();
  });

  setTimeout(() => input?.focus(), 0);
}

    { n:"Batching & File Processing",t:2,r:"R2",c:2,desc:"Manages batch infrastructure and SFTP file transfers to/from banks",out:["Aib File Mgmt","Transaction File Mgmt"],in:["Bulkfiles Core"]},
    { n:"Rebatching Interface",t:3,r:"R3",c:3,desc:"Allows ops teams to fix and regenerate failed or rejected settlement batches",out:["Bulkfiles Core"],in:[]},

    { n:"Transaction File Mgmt",t:2,r:"R2",c:2,desc:"General-purpose service for managing transaction files across bank integrations",out:[],in:["Batching & File Processing"]},

    { n:"TSS",t:2,r:"R2",c:2,desc:"Provides transaction lookup across the platform for portals and internal support",out:["RealControl Reporting"],in:["API","PRM-service","Billing Service","MRDI"]},
    { n:"RealControl Reporting",t:2,r:"R2",c:2,desc:"Merchant-facing portal for viewing transaction history and settlement details",out:[],in:["TSS"]},
    { n:"Merchant Reporting",t:2,r:"R2",c:2,desc:"Generates merchant-facing reports, statements, and summaries",out:[],in:["MRDI","Billing Service"]},
    { n:"MRDI",t:2,r:"R2",c:2,desc:"Imports and transforms raw transaction data into report-ready format",out:["Merchant Reporting","TSS"],in:[]},
    { n:"Datalake-Notification",t:2,r:"R2",c:2,desc:"Publishes transaction events to the data lake for analytics pipelines",out:[],in:["Transaction Router"]},
    { n:"Propay-notifications",t:2,r:"R2",c:2,desc:"Notification service for ProPay integration events",out:[],in:["Propay-gateway"]},
    { n:"Installment-Notification",t:2,r:"R2",c:2,desc:"Sends notifications related to installment payment events",out:[],in:["Installment-service"]},
    { n:"OpenBanking File Management",t:2,r:"R2",c:2,desc:"Handles file-based reconciliation and reporting for Open Banking transactions",out:[],in:["Open Banking"]},
  ]},
  { name: "Admin tools & portals", id: "admin", svcs: [
    { n:"HPP On-Prem",t:2,r:"R2",c:2,desc:"On-premise HPP variant for data residency requirements",out:[],in:[]},
    { n:"White-emanager",t:2,r:"R2",c:2,desc:"White-labelled merchant management portal for partners and resellers",out:["CSS"],in:[]},
    { n:"CMS",t:3,r:"R3",c:3,desc:"Content Management System for HPP templates, emails, and portal content",out:["HPP"],in:[]},
    { n:"Template uploader",t:3,r:"R3",c:3,desc:"Allows merchants/teams to upload custom branding templates for payment pages",out:["HPP"],in:[]},
    { n:"Gadmin",t:3,r:"R3",c:3,desc:"Internal admin console for merchant setup, routing rules, and configuration",out:["CSS","Transaction Router"],in:[]},
    { n:"Briscoe Management Tool",t:3,r:"R3",c:3,desc:"Internal tool for a specific operational management function",out:[],in:[]},
    { n:"TMT",t:3,r:"R3",c:3,desc:"Monitors transaction patterns for AML compliance and suspicious activity",out:["TSS"],in:[]},
  ]},
  { name: "Infrastructure", id: "infra", svcs: [
    { n:"CDN",t:2,r:"R2",c:2,desc:"Content Delivery Network — serves HPP assets from global edge servers",out:[],in:["HPP"]},
    { n:"Vormetric TDE",t:2,r:"R2",c:2,desc:"Transparent Data Encryption — encrypts data at rest on disk",out:[],in:["Crypto"]},
    { n:"GlusterFS",t:2,r:"R2",c:2,desc:"Distributed file storage for shared file access across application nodes",out:[],in:[]},
    { n:"Memcached",t:3,r:"R3",c:3,desc:"In-memory caching for frequently accessed data like merchant configs and BIN tables",out:[],in:["CSS","Card ID Service"]},
    { n:"Elasticsearch Watchers",t:3,r:"R3",c:3,desc:"Automated alerting based on Elasticsearch queries for log/metric anomalies",out:[],in:[]},
    { n:"Kibana",t:3,r:"R3",c:3,desc:"Elasticsearch-based dashboarding for internal operational monitoring",out:[],in:[]},
  ]},
  { name: "DevOps & legacy", id: "devops", svcs: [
    { n:"Sandbox Services",t:3,r:"R3",c:3,desc:"Test/sandbox environment for merchant integration testing",out:[],in:[]},
    { n:"Test Archetype",t:3,r:"R3",c:3,desc:"Testing framework template for standardized test suite scaffolding",out:[],in:[]},
    { n:"test-archetype-api",t:3,r:"R3",c:3,desc:"API companion to the test archetype for automated testing",out:[],in:[]},
    { n:"MAAS",t:3,r:"R3",c:3,desc:"Metal/Monitoring as a Service — infrastructure provisioning or monitoring",out:[],in:[]},
    { n:"Artifactory",t:3,r:"R3",c:3,desc:"Artifact repository for storing build artifacts, Docker images, and dependencies",out:[],in:[]},
    { n:"Nexus",t:3,r:"R3",c:3,desc:"Secondary artifact repository for build artifacts and dependency management",out:[],in:[]},
    { n:"Automic UC4",t:3,r:"R3",c:3,desc:"Enterprise scheduler for batch jobs, reports, and maintenance tasks",out:["Bulkfiles Core","Batching & File Processing"],in:[]},
    { n:"Scheduler",t:3,r:"R3",c:3,desc:"Lightweight application-level scheduling for recurring tasks",out:[],in:[]},
    { n:"AAU",t:3,r:"R3",c:3,desc:"Internal authentication/authorization utility",out:[],in:[]},
    { n:"Blue-e",t:3,r:"R3",c:3,desc:"Legacy internal system or platform version",out:[],in:[]},
    { n:"CML",t:3,r:"R3",c:3,desc:"Configuration Management Library or internal tooling",out:[],in:[]},
  ]},
];

const svcMap = {};
LAYERS.forEach(l => l.svcs.forEach(s => { s.layer = l.id; s.layerName = l.name; svcMap[s.n] = s; }));

let activeFilters = new Set();
let selectedSvc = null;

function toggleFilter(tier) {
  const btn = document.querySelector(`.filter-btn[data-tier="${tier}"]`);
  if (activeFilters.has(tier)) { activeFilters.delete(tier); btn.classList.remove('active'); }
  else { activeFilters.add(tier); btn.classList.add('active'); }
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const name = el.dataset.name;
    const svc = svcMap[name];
    if (!svc) return;
    const matchTier = activeFilters.size === 0 || activeFilters.has(svc.t);
    const matchSearch = !q || name.toLowerCase().includes(q) || svc.desc.toLowerCase().includes(q);
    el.classList.toggle('hidden', !(matchTier && matchSearch));
  });
  document.querySelectorAll('.sidebar-section').forEach(sec => {
    const visible = sec.querySelectorAll('.sidebar-item:not(.hidden)').length;
    const countEl = sec.querySelector('.count');
    if (countEl) countEl.textContent = visible;
  });
}

document.getElementById('search').addEventListener('input', applyFilters);

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  LAYERS.forEach(l => {
    const sec = document.createElement('div');
    sec.className = 'sidebar-section';
    sec.innerHTML = `<div class="sidebar-section-header" onclick="this.nextElementSibling.classList.toggle('hidden');this.querySelector('.chevron').classList.toggle('collapsed')">
      ${l.name}<span><span class="count">${l.svcs.length}</span> <span class="chevron">▾</span></span>
    </div><div class="sidebar-list">${l.svcs.map(s => {
      const ti = TIERS[s.t];
      const totalConns = (s.out?.length||0) + (s.in?.length||0);
      return `<div class="sidebar-item" data-name="${s.n}" onclick="selectService('${s.n.replace(/'/g,"\\'")}')">
        <span class="dot" style="background:${ti.color}"></span>
        <span class="name">${s.n}</span>
        <span class="tier-badge" style="background:${ti.bg};color:${ti.color}">T${s.t}</span>
        ${totalConns ? `<span class="conn-count">${totalConns}</span>` : ''}
      </div>`;
    }).join('')}</div>`;
    sb.appendChild(sec);
  });
}

function selectService(name) {
  const svc = svcMap[name];
  if (!svc) return;
  selectedSvc = name;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.toggle('active', el.dataset.name === name));
  const main = document.getElementById('main');
  const ti = TIERS[svc.t];
  const ri = RISK[svc.r];

  const allOut = (svc.out || []).filter(n => n !== 'Gateways' && n !== 'All Gateways');
  const isGwRef = (svc.out || []).some(n => n === 'Gateways' || n === 'All Gateways');
  const allIn = (svc.in || []);
  const reverseIn = [];
  Object.values(svcMap).forEach(s => {
    if (s.n !== name && s.out && s.out.includes(name) && !allIn.includes(s.n)) reverseIn.push(s.n);
  });
  const combinedIn = [...new Set([...allIn, ...reverseIn])];

  let gwHtml = '';
  if (isGwRef) {
    const gwLayer = LAYERS.find(l => l.id === 'gw');
    const gws = gwLayer.svcs.filter(g => g.n !== 'Stunnel' && g.n !== 'SSO - Desjardins' && g.n !== 'Fexco gateway mock' && g.n !== 'Hosted Redirect Router');
    gwHtml = `<div class="conn-group-title">Routes to gateways (${gws.length})</div>
      <div class="conn-chips">${gws.map(g => chipHtml(g.n)).join('')}</div>`;
  }

  main.innerHTML = `
    <div class="detail-card">
      <div class="detail-header">
        <div>
          <div class="detail-title">${svc.n}</div>
          <div class="detail-badges">
            <span class="badge-pill" style="background:${ti.bg};color:${ti.color}">${ti.label}</span>
            <span class="badge-pill" style="background:rgba(248,113,113,.1);color:${ri}">Risk ${svc.r}</span>
            <span class="badge-pill" style="background:rgba(96,165,250,.1);color:#60a5fa">Canary ${svc.c}</span>
            <span class="badge-pill" style="background:var(--surface2);color:var(--text2)">${svc.layerName}</span>
          </div>
        </div>
      </div>
      <div class="detail-desc">${svc.desc}</div>
      <div class="connections-grid">
        ${allOut.length ? `<div class="conn-group-title">Sends to / depends on (${allOut.length})</div><div class="conn-chips">${allOut.map(n => chipHtml(n)).join('')}</div>` : ''}
        ${gwHtml}
        ${combinedIn.length ? `<div class="conn-group-title">Receives from / called by (${combinedIn.length})</div><div class="conn-chips">${combinedIn.map(n => chipHtml(n)).join('')}</div>` : ''}
        ${!allOut.length && !combinedIn.length && !isGwRef ? '<div style="color:var(--text3);font-size:13px">Standalone service — no mapped upstream/downstream connections</div>' : ''}
      </div>
    </div>
    ${buildFlowCards(name)}
  `;
}

function chipHtml(name) {
  const s = svcMap[name];
  const color = s ? TIERS[s.t].color : '#6b7280';
  return `<span class="conn-chip" onclick="selectService('${name.replace(/'/g,"\\'")}')" title="${s?.desc||''}"><span class="chip-dot" style="background:${color}"></span>${name}</span>`;
}

const FLOWS = [
  { title: "Real-time transaction flow", steps: ["Payments API","IPS","3DS2","Transaction Router","Gateway*","Authorization Service","Messenger Service"], icon: "⚡" },
  { title: "Settlement flow", steps: ["Bulkfiles Core","Batch ID Service","MCS","Bank Service","Batching & File Processing"], icon: "🏦" },
  { title: "Fraud & risk pipeline", steps: ["IPS","Fraud Engine","Card ID Service","PRM-service","TSS"], icon: "🛡" },
  { title: "Reporting pipeline", steps: ["MRDI","TSS","Billing Service","Merchant Reporting","RealControl Reporting"], icon: "📊" },
];

function buildFlowCards(activeName) {
  return FLOWS.filter(f => f.steps.includes(activeName) || f.steps.some(s => s.replace('*','') === activeName)).map(f =>
    `<div class="flow-card"><h3>${f.icon} ${f.title}</h3><div class="flow-steps">${f.steps.map((s,i) => {
      const clean = s.replace('*','');
      const svc = svcMap[clean];
      const color = svc ? TIERS[svc.t].color : '#6b7280';
      const bg = svc ? TIERS[svc.t].bg : 'rgba(107,114,128,.1)';
      const bold = clean === activeName;
      return `${i?'<span class="flow-arrow">→</span>':''}
        <span class="flow-step" style="background:${bg};color:${color};${bold?'outline:1.5px solid '+color+';font-weight:600':''}" onclick="selectService('${clean.replace(/'/g,"\\'")}')">${s}</span>`;
    }).join('')}</div></div>`
  ).join('');
}

function showWelcome() {
  const t1 = LAYERS.reduce((a,l) => a + l.svcs.filter(s=>s.t===1).length, 0);
  const t2 = LAYERS.reduce((a,l) => a + l.svcs.filter(s=>s.t===2).length, 0);
  const t3 = LAYERS.reduce((a,l) => a + l.svcs.filter(s=>s.t===3).length, 0);
  const total = t1+t2+t3;
  document.getElementById('main').innerHTML = `
    <div class="stats-bar">
      <div class="stat" style="color:var(--t1)"><small>Tier 1</small>${t1}</div>
      <div class="stat" style="color:var(--t2)"><small>Tier 2</small>${t2}</div>
      <div class="stat" style="color:var(--t3)"><small>Tier 3</small>${t3}</div>
      <div class="stat"><small>Total</small>${total}</div>
      <div class="stat"><small>Layers</small>${LAYERS.length}</div>
    </div>
    ${FLOWS.map(f => `<div class="flow-card"><h3>${f.icon} ${f.title}</h3><div class="flow-steps">${f.steps.map((s,i) => {
      const clean = s.replace('*','');
      const svc = svcMap[clean];
      const color = svc ? TIERS[svc.t].color : '#6b7280';
      const bg = svc ? TIERS[svc.t].bg : 'rgba(107,114,128,.1)';
      return `${i?'<span class="flow-arrow">→</span>':''}
        <span class="flow-step" style="background:${bg};color:${color}" onclick="selectService('${clean.replace(/'/g,"\\'")}')">${s}</span>`;
    }).join('')}</div></div>`).join('')}
    <div class="welcome-state">
      <div class="big-icon">◎</div>
      <h2>Select a service to explore</h2>
      <p>Click any service in the sidebar to see its description, tier, risk level, and all upstream/downstream connections. Use the search bar or tier filters to narrow down.</p>
    </div>
  `;
}

buildSidebar();
showWelcome();
initGate();
</script>
</body>
</html>
