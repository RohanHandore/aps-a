<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP ECom Gateway — Architecture Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080c;--sf:#111116;--s2:#191920;--s3:#21212a;
  --bd:#242430;--bh:#34344a;
  --tx:#e6e4df;--t2:#9a9a9a;--t3:#55556a;
  --purple:#a78bfa;--purpleBg:rgba(167,139,250,.10);--purpleGl:rgba(167,139,250,.30);
  --green:#34d399;--greenBg:rgba(52,211,153,.09);--greenGl:rgba(52,211,153,.22);
  --gray:#6b7280;--grayBg:rgba(107,114,128,.09);
  --blue:#60a5fa;--blueBg:rgba(96,165,250,.09);
  --amber:#fbbf24;--amberBg:rgba(251,191,36,.09);
  --red:#f87171;--cyan:#22d3ee;
  --f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--f);overflow:hidden;height:100vh}
::selection{background:rgba(167,139,250,.25)}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;height:46px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
.hdr .logo{display:flex;align-items:center;gap:8px}
.hdr .ic{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--purple),var(--blue));font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.hdr h1{font-size:13px;font-weight:600;white-space:nowrap}
.hdr h1 span{color:var(--t2);font-weight:400}
.hdr .sep{flex:1}
.lgd{display:flex;gap:10px;font-size:10px;color:var(--t2);align-items:center;flex-wrap:wrap}
.lgd b{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:2px;vertical-align:middle}
.ctrls{display:flex;gap:4px}
.cb{width:28px;height:28px;border-radius:6px;background:var(--s2);border:1px solid var(--bd);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--f);transition:all .12s}
.cb:hover{border-color:var(--bh);color:var(--tx)}
.cb.txt{width:auto;padding:0 10px;font-size:10px;font-weight:500}

/* ── CANVAS ── */
.wrap{position:fixed;top:46px;left:0;right:0;bottom:40px;overflow:hidden;cursor:grab}
.wrap:active{cursor:grabbing}
.cvs{position:absolute;transform-origin:0 0}

/* ── ZONES ── */
.zone{position:absolute;border:1.5px dashed;border-radius:14px;z-index:0;pointer-events:none;opacity:.5}
.zlbl{position:absolute;font-size:8px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;z-index:0;background:var(--bg);padding:0 5px}

/* ── NODES ── */
.nd{position:absolute;border-radius:7px;cursor:pointer;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5px 8px;font-size:10.5px;font-weight:500;line-height:1.25;user-select:none;border:1px solid rgba(255,255,255,.05);transition:transform .1s,box-shadow .15s,border-color .15s,opacity .2s}
.nd:hover{transform:scale(1.07);z-index:30}
.nd.hl{z-index:20}
.nd small{font-size:8px;font-weight:400;opacity:.55;margin-top:1px}

/* Tier colors */
.nd.t1{background:var(--purpleBg);color:var(--purple)}
.nd.t1.hl{border-color:var(--purple);box-shadow:0 0 16px var(--purpleGl)}
.nd.t2{background:var(--greenBg);color:var(--green)}
.nd.t2.hl{border-color:var(--green);box-shadow:0 0 14px var(--greenGl)}
.nd.t3{background:var(--grayBg);color:var(--gray)}
.nd.t3.hl{border-color:var(--gray);box-shadow:0 0 12px rgba(107,114,128,.2)}

/* Special types */
.nd.ext{background:rgba(255,255,255,.025);color:var(--t2);border-color:rgba(255,255,255,.04);font-size:9.5px;border-radius:4px;padding:3px 7px}
.nd.ext.hl{border-color:var(--blue);box-shadow:0 0 10px rgba(96,165,250,.18);color:var(--blue)}
.nd.db{border-radius:3px 3px 14px 14px;border-color:rgba(251,191,36,.15);background:rgba(251,191,36,.06);color:var(--amber)}
.nd.db.hl{border-color:var(--amber);box-shadow:0 0 14px rgba(251,191,36,.22)}
.nd.big{font-size:13px;font-weight:600;letter-spacing:-.2px}
.nd .ico{font-size:11px;margin-bottom:1px;opacity:.5}

/* ── SVG EDGES ── */
svg.el{position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible}

/* ── TOOLTIP ── */
.tt{position:fixed;z-index:300;background:var(--sf);border:1px solid var(--bh);border-radius:10px;padding:14px 16px;max-width:340px;pointer-events:none;opacity:0;transition:opacity .1s;font-size:12px;line-height:1.55;box-shadow:0 12px 40px rgba(0,0,0,.55)}
.tt.show{opacity:1}
.tt .tn{font-size:14px;font-weight:600;margin-bottom:4px;letter-spacing:-.2px}
.tt .tb{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.tt .tp{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:500}
.tt .td{color:var(--t2)}
.tt .tc{margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);font-size:10px;color:var(--t3);line-height:1.6}
.tt .tc strong{color:var(--t2);font-weight:500}

/* ── INFO BAR ── */
.ib{position:fixed;bottom:0;left:0;right:0;height:40px;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;font-size:11px;color:var(--t2)}
.ib .nm{font-weight:600;color:var(--tx);font-size:11px}
.ib .ds{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib .pl{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:500}
.ib .ht{color:var(--t3);font-style:italic;font-size:10px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><div class="ic">GP</div><h1>GP ECom gateway<span> — service architecture</span></h1></div>
  <div class="sep"></div>
  <div class="lgd">
    <span><b style="background:var(--purple)"></b>Tier 1</span>
    <span><b style="background:var(--green)"></b>Tier 2</span>
    <span><b style="background:var(--gray)"></b>Tier 3</span>
    <span><b style="background:rgba(251,191,36,.4)"></b>Database</span>
    <span><b style="background:rgba(255,255,255,.06);border:1px solid var(--bd)"></b>External</span>
  </div>
  <div class="ctrls">
    <button class="cb" onclick="zm(1.2)" title="Zoom in">+</button>
    <button class="cb" onclick="zm(1/1.2)" title="Zoom out">−</button>
    <button class="cb" onclick="fit()" title="Fit to screen">⌂</button>
    <button class="cb txt" onclick="clr()">Reset</button>
  </div>
</div>

<div class="wrap" id="W"><div class="cvs" id="C"></div></div>
<div class="tt" id="TT"></div>
<div class="ib" id="IB"><span class="ht">Hover a service for details · Click to lock highlight · Esc to reset · Scroll to zoom · Drag to pan</span></div>

<script>
/* ══════════════════════════════════════════════════════════
   NODE DATA — positions match the provided diagram exactly
   ══════════════════════════════════════════════════════════ */
const N=[
// ─── MERCHANTS (far left) ───
{id:"Merchant System",x:20,y:295,w:95,h:40,t:1,d:"External merchant system integrating via REST API. Sends transaction requests directly to the Transaction Router for real-time processing."},
{id:"Merchant System (HPP)",x:20,y:430,w:95,h:38,t:1,lbl:"Merchant\nSystem",d:"Merchant system using the Hosted Payment Page integration. Redirects customers to HPP for card capture, reducing the merchant's PCI DSS scope."},
{id:"Merchant",x:20,y:520,w:72,h:32,t:1,d:"Merchant operator using the RealControl Virtual Terminal to manually key card-not-present transactions via a web browser."},

// ─── ENTRY SERVICES ───
{id:"HPP",x:158,y:435,w:58,h:36,t:1,d:"Hosted Payment Page — a white-labelled, PCI-compliant checkout page hosted by Global Payments. Captures card data on behalf of the merchant and forwards it into the processing path via Transaction Router."},
{id:"RC2.1",x:148,y:520,w:56,h:32,t:1,d:"RealControl 2.1 — web-based Virtual Terminal interface. Allows operators to key in card-not-present transactions which are passed to rxp-api for processing."},
{id:"rxp-api",x:240,y:520,w:68,h:32,t:1,d:"Realex Payments XML/JSON API — legacy but high-volume merchant-facing API. Receives transactions from RC2.1 and other integrations, and feeds them into the Transaction Router."},

// ─── TRANSACTION ROUTER ───
{id:"Transaction Router",x:230,y:293,w:120,h:44,t:1,big:1,d:"Core routing engine at the heart of the gateway. Inspects card BIN, currency, merchant configuration, and 3DS requirements to decide the correct processing path. Routes to IPS for real-time processing, and dispatches to APM, DCC, 3DS Server, and CSS as needed."},

// ─── ABOVE TR: VALUE-ADDED ───
{id:"APM",x:310,y:58,w:60,h:34,t:1,d:"Alternative Payment Methods service — integrates non-card payment rails including iDEAL (Netherlands), Sofort (Germany), Giropay (Germany), Bancontact (Belgium) and others. Routes to PPRo aggregator."},
{id:"DCC",x:300,y:125,w:62,h:34,t:2,d:"Dynamic Currency Conversion service — offers international cardholders the option to pay in their home currency at point of sale. Queries real-time FX rates and routes to Planet and Fexco gateways for rate provision and conversion."},
{id:"3DS Server",x:272,y:195,w:82,h:34,t:1,d:"3D Secure authentication server — implements the EMVCo 3DS2 protocol for Strong Customer Authentication (SCA) under PSD2. Communicates challenge/frictionless flows before the transaction proceeds through IPS."},
{id:"CSS",x:300,y:255,w:56,h:32,t:1,d:"Configuration & Settings Service — the central configuration store for the entire platform. Holds merchant profiles, terminal IDs, routing rules, feature flags, and processing parameters. Queried by Transaction Router on every transaction."},

// ─── IPS (large central block) ───
{id:"IPS",x:410,y:240,w:150,h:115,t:1,big:1,d:"Inline Processing Service — the central real-time orchestration engine. Receives routed transactions, performs inline fraud/risk scoring, coordinates with Crypto for card data encryption/decryption, dispatches to Bank Service for acquirer gateway routing, and writes transaction records to the payandshop database. Also triggers Settlement and Fraud Engine paths."},

// ─── RIGHT OF IPS: unnamed processing block + Crypto ───
{id:"Bank DBs",x:590,y:108,w:72,h:48,t:1,db:1,lbl:"bank\ndbs",d:"Bank configuration databases — stores acquiring bank credentials, BIN routing tables, terminal configurations, and HSM key references. Referenced by Crypto for key lookups and by the processing layer for acquirer selection."},
{id:"Crypto",x:590,y:195,w:70,h:38,t:1,d:"Cryptographic services engine — handles all HSM-backed encryption, decryption, PIN translation, and key management for PAN, CVV, and PIN data. Sits between IPS and the gateway layer to ensure card data is encrypted in transit and at rest. References Bank DBs for key material."},

// ─── BANK SERVICE (gateway dispatcher) ───
{id:"Bank Service",x:600,y:370,w:85,h:44,t:1,d:"Gateway dispatcher — the acquirer routing layer. After IPS processes the transaction, Bank Service selects the correct downstream gateway based on the merchant's acquiring bank relationship, card brand, BIN, currency, and region. Connects to all gateway services."},

// ─── GATEWAYS (right column) ───
{id:"ISO GW",x:740,y:160,w:80,h:36,t:1,d:"ISO 8583 Gateway — general-purpose connector speaking the ISO 8583 financial messaging standard. Routes to multiple UK and European acquirers: Elavon, Santander, AIB, Worldpay, Barclays, Lloyds, GP UK/HSBC, and UK/HSBC failover."},
{id:"APACS XOT GW",x:740,y:218,w:100,h:36,t:1,lbl:"APACS\nXOT GW",d:"APACS gateway supporting both TCP/IP and X.25-over-TCP (XOT) transport. Connects to UK banks using the legacy APACS messaging standard. Routes to AIB, Worldpay, Barclays, Lloyds, GP UK/HSBC."},
{id:"Redsys",x:740,y:300,w:70,h:34,t:1,lbl:"Redsys",d:"Redsys gateway — connects to Spain's national Redsys card processing network for all Spanish domestic and international card acquiring."},
{id:"GPC",x:740,y:348,w:60,h:34,t:1,d:"GSAP/GPC Gateway — Global Payments Cloud gateway routing to the Global and South Asia Pacific regional processor. Primary path to GPNA (Global Payments North America)."},
{id:"UATP",x:740,y:400,w:60,h:34,t:1,d:"Universal Air Travel Plan gateway — specialised connector for airline payment processing. Handles UATP card transactions and routes through to Cybersource for settlement."},
{id:"AIB APACS",x:740,y:450,w:80,h:34,t:2,d:"Dedicated APACS connection specifically to Allied Irish Banks. Separate from the general APACS/XOT gateway to handle AIB-specific message format requirements and routing."},

// ─── DCC/APM GATEWAYS (top-right) ───
{id:"Planet GW",x:710,y:72,w:72,h:30,t:2,lbl:"Planet",d:"Planet Payment ISO gateway — connects to Planet Payment for multi-currency Dynamic Currency Conversion in hospitality, travel, and retail verticals."},
{id:"Fexco GW",x:710,y:110,w:68,h:30,t:2,lbl:"Fexco",d:"Fexco gateway — connects to Fexco's foreign exchange platform for DCC rate provision and real-time currency conversion services."},

// ─── EXTERNAL ENDPOINTS (far right) ───
{id:"PPRo",x:920,y:56,w:52,h:26,t:2,ext:1,d:"PPRo — alternative payment method aggregator. Connects the APM rail to local payment providers across Europe (iDEAL, Sofort, Giropay, Bancontact, eps, etc.)."},
{id:"Planet (ext)",x:840,y:72,w:52,h:24,t:2,ext:1,lbl:"Planet",d:"Planet Payment — external multi-currency payment technology provider for hospitality and travel."},
{id:"Fexco (ext)",x:840,y:110,w:50,h:24,t:2,ext:1,lbl:"Fexco",d:"Fexco — external foreign exchange and DCC service provider headquartered in Ireland."},

{id:"Elavon",x:900,y:135,w:52,h:22,t:1,ext:1,d:"Elavon — major US and European payment processor and acquiring bank, subsidiary of US Bancorp."},
{id:"Santander",x:900,y:160,w:65,h:22,t:1,ext:1,d:"Santander — global bank providing card acquiring services across Europe and Latin America."},
{id:"AIB (ISO)",x:960,y:183,w:40,h:22,t:1,ext:1,lbl:"AIB",d:"Allied Irish Banks — reached via ISO 8583 gateway for domestic Irish acquiring."},
{id:"Worldpay",x:900,y:205,w:62,h:22,t:1,ext:1,d:"Worldpay (FIS) — one of the world's largest payment processors handling billions of transactions annually."},
{id:"Barclays",x:900,y:230,w:58,h:22,t:1,ext:1,d:"Barclays — major UK acquiring bank providing card acceptance services."},
{id:"Lloyds",x:900,y:255,w:48,h:22,t:1,ext:1,d:"Lloyds Banking Group — UK acquiring endpoint for domestic card processing."},
{id:"GP UK/HSBC",x:900,y:278,w:82,h:22,t:1,ext:1,lbl:"GP UK/HSBC\nGP",d:"Global Payments UK / HSBC — acquiring arrangement where GP processes on behalf of HSBC merchant services."},
{id:"UK/HSBC failover",x:900,y:302,w:95,h:22,t:1,ext:1,lbl:"UK/HSBC\nfailover",d:"UK/HSBC failover — backup acquiring path providing resilience for the HSBC processing arrangement."},
{id:"Redsys (ext)",x:880,y:300,w:52,h:22,t:1,ext:1,lbl:"Redsys",d:"Redsys — Spain's national card scheme and interbank processing network."},
{id:"GPNA",x:880,y:348,w:52,h:22,t:1,ext:1,d:"Global Payments North America — core NA market processor handling US and Canadian transactions."},
{id:"Cybersource (UATP)",x:880,y:400,w:82,h:22,t:1,ext:1,lbl:"Cybersource",d:"Visa Cybersource — reached via UATP gateway for airline payment processing and settlement."},
{id:"AIB (APACS)",x:880,y:450,w:48,h:22,t:1,ext:1,lbl:"AIB",d:"Allied Irish Banks — reached via dedicated AIB APACS gateway for APACS-format transactions."},

// ─── SETTLEMENT PATH ───
{id:"Settlement",x:620,y:445,w:75,h:38,t:1,ico:"📄",d:"Settlement engine — groups approved authorisations into settlement batches based on cut-off windows and merchant configurations. Prepares batch data for handoff to Batch ID Service for unique identification and file generation."},
{id:"Batch ID Service",x:620,y:508,w:95,h:36,t:1,lbl:"Batch Id\nService",d:"Generates and manages unique batch identifiers for settlement file processing. Each settlement batch receives a unique ID tracked through the entire lifecycle — from batch creation to bank file submission to reconciliation."},

// ─── FRAUD PATH ───
{id:"Fraud Engine",x:480,y:480,w:90,h:38,t:2,d:"Real-time fraud detection engine — runs configurable rule sets and ML-based risk scoring models against each transaction. Reads historical transaction patterns from payandshop DB and writes fraud scores back. Flags high-risk transactions for additional external scoring via Fraud GW."},
{id:"Fraud GW",x:740,y:540,w:75,h:32,t:2,d:"Dedicated fraud gateway — sends flagged high-risk transactions to external fraud scoring and decision management services (primarily Cybersource Decision Manager) for secondary risk assessment."},
{id:"Cybersource (fraud)",x:880,y:540,w:82,h:24,t:1,ext:1,lbl:"Cybersource",d:"Visa Cybersource Decision Manager — external fraud scoring and risk management service. Receives flagged transactions from Fraud GW for secondary AI-based risk analysis."},

// ─── CENTRAL DB: payandshop ───
{id:"payandshop",x:400,y:410,w:105,h:52,t:1,db:1,d:"Central transaction database — the master transactional data store for the entire GP ECom platform. Records every transaction from authorisation through settlement. Read/written by: IPS (real-time writes), Fraud Engine (pattern reads/score writes), WhiteE (merchant portal reads), TMT (AML monitoring reads), MCS (currency data reads)."},

// ─── ADMIN / MONITORING ───
{id:"MCS",x:295,y:460,w:58,h:32,t:1,d:"Multi-Currency Service — handles foreign exchange conversion for settlement of cross-border transactions. Reads currency-related transaction data from payandshop and applies conversion rates for settlement in the merchant's base currency."},
{id:"WhiteE",x:300,y:530,w:62,h:32,t:2,ico:"👤",d:"White-emanager (WhiteE) — white-labelled merchant management portal for partners, ISOs, and resellers. Provides transaction search, reporting, merchant onboarding, and configuration management. Reads transaction data from payandshop."},
{id:"TMT",x:480,y:555,w:55,h:32,t:3,ico:"👤",d:"Transaction Monitoring Tool — AML compliance monitoring system. Continuously analyses transaction patterns from payandshop to detect suspicious activity, structuring, velocity anomalies, and other financial crime indicators. Operated by compliance teams."},

// ─── BOTTOM STANDALONE ROW ───
{id:"CMS",x:60,y:635,w:48,h:28,t:3,d:"Content Management System — manages HPP page templates, notification email templates, and merchant portal content. Allows customisation of the payment page look and feel."},
{id:"AAU",x:128,y:635,w:48,h:28,t:3,d:"Authentication & Authorisation Utility — internal identity and access management service for platform users and operator accounts."},
{id:"Card ID Service",x:196,y:635,w:95,h:28,t:1,lbl:"Card ID\nService",d:"Card Identification Service — performs real-time BIN (Bank Identification Number) lookups to identify card type (credit/debit), scheme (Visa/MC/Amex), issuing bank, country of issue, and card-level attributes. Used for intelligent routing, fee calculation, and regulatory compliance."},
{id:"Open Banking",x:310,y:635,w:90,h:28,t:1,lbl:"Open\nBanking",d:"Open Banking service — enables account-to-account (A2A) bank payments via PSD2 Open Banking APIs. Bypasses card networks entirely for direct bank transfers, reducing interchange costs for merchants."},
{id:"WDS",x:420,y:635,w:48,h:28,t:2,d:"Web-based Data Service — supports transaction processing workflows, web-based data integrations, and internal operational tooling."},
{id:"MAAS",x:488,y:635,w:55,h:28,t:3,d:"Metal/Monitoring as a Service — infrastructure provisioning, bare-metal server management, and platform monitoring tooling for the operations team."},
{id:"OTP",x:563,y:635,w:48,h:28,t:2,d:"One-Time Password service — generates and validates time-based and event-based OTPs for cardholder authentication, 3DS challenge flows, and transaction verification steps."},
{id:"Batches",x:631,y:635,w:60,h:28,t:2,d:"Batch processing service — manages scheduled batch file infrastructure, SFTP file transfers to/from acquiring banks, and reconciliation file processing."},

  {x:585,y:340,w:150,h:230,c:var_bd(),l:"Dispatch & settlement",lx:590,ly:337},
  {x:725,y:52,w:130,h:450,c:var_bd(),l:"Gateways",lx:730,ly:49},
  {x:870,y:52,w:145,h:430,c:var_bd(),l:"Acquirers & processors",lx:875,ly:49},
  {x:380,y:390,w:215,h:215,c:"rgba(251,191,36,.12)",l:"payandshop ecosystem",lx:385,ly:387},
  {x:45,y:620,w:665,h:55,c:var_bd(),l:"Standalone services",lx:50,ly:617},
];
function var_bd(){return"var(--bd)"}

/* ══════════════════════════════════════════════════════════
   RENDER ENGINE
   ══════════════════════════════════════════════════════════ */
const cvs=document.getElementById('C'),W_el=document.getElementById('W'),ttEl=document.getElementById('TT'),ibEl=document.getElementById('IB');
let sc=1,px=0,py=0,drag=false,lx,ly,sel=null;
const nMap={};N.forEach(n=>nMap[n.id]=n);
const adj={};N.forEach(n=>adj[n.id]={o:new Set(),i:new Set()});
E.forEach(([a,b])=>{if(adj[a])adj[a].o.add(b);if(adj[b])adj[b].i.add(a)});

function render(){
  const CW=1040,CH=690;
  let h='';

  // Zones
  Z.forEach(z=>{
    h+=`<div class="zone" style="left:${z.x}px;top:${z.y}px;width:${z.w}px;height:${z.h}px;border-color:${z.c}"></div>`;
    h+=`<div class="zlbl" style="left:${z.lx}px;top:${z.ly}px">${z.l}</div>`;
  });

  // SVG
  h+=`<svg class="el" id="SV" width="${CW}" height="${CH}" viewBox="0 0 ${CW} ${CH}">
  <defs><marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
  <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><g id="EG">`;
  E.forEach(([a,b])=>{
    const na=nMap[a],nb=nMap[b];if(!na||!nb)return;
    const aw=na.w||70,ah_=na.h||32,bw=nb.w||70,bh=nb.h||32;
    const acx=na.x+aw/2,acy=na.y+ah_/2,bcx=nb.x+bw/2,bcy=nb.y+bh/2;
    let x1,y1,x2,y2;
    const dx=bcx-acx,dy=bcy-acy;
    if(Math.abs(dx)>Math.abs(dy)){
      x1=dx>0?na.x+aw:na.x; x2=dx>0?nb.x:nb.x+bw; y1=acy; y2=bcy;
    } else {
      y1=dy>0?na.y+ah_:na.y; y2=dy>0?nb.y:nb.y+bh; x1=acx; x2=bcx;
    }
    h+=`<line data-f="${a}" data-t="${b}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--t3)" stroke-width=".7" opacity=".28" marker-end="url(#ah)"/>`;
  });
  h+=`</g></svg>`;

  // Nodes
  N.forEach(n=>{
    const w=n.w||70,ht=n.h||32;
    let cls='nd';
    if(n.ext)cls+=' ext';else if(n.db)cls+=' db';else cls+=` t${n.t}`;
    if(n.big)cls+=' big';
    const lbl=(n.lbl||n.id).replace(/\n/g,'<br>');
    const ico=n.ico?`<span class="ico">${n.ico}</span>`:'';
    h+=`<div class="${cls}" data-id="${n.id}" style="left:${n.x}px;top:${n.y}px;width:${w}px;height:${ht}px" onmouseenter="hIn(this)" onmouseleave="hOut()" onclick="ck('${esc(n.id)}')">${ico}${lbl}</div>`;
  });

  cvs.innerHTML=h;
  cvs.style.width=CW+'px';cvs.style.height=CH+'px';
  fit();
}
function esc(s){return s.replace(/'/g,"\\'");}

/* ── TOOLTIP ── */
function hIn(el){
  const id=el.dataset.id,n=nMap[id];if(!n)return;
  const tc=n.t===1?'var(--purple)':n.t===2?'var(--green)':'var(--gray)';
  const tb=n.t===1?'var(--purpleBg)':n.t===2?'var(--greenBg)':'var(--grayBg)';
  const oo=[...(adj[id]?.o||[])],ii=[...(adj[id]?.i||[])];
  let ch='';
  if(oo.length)ch+=`<strong>→ Sends to:</strong> ${oo.join(', ')}<br>`;
  if(ii.length)ch+=`<strong>← Receives from:</strong> ${ii.join(', ')}`;
  ttEl.innerHTML=`<div class="tn">${n.id}</div>
    <div class="tb">
      <span class="tp" style="background:${tb};color:${tc}">Tier ${n.t}</span>
      ${n.ext?'<span class="tp" style="background:var(--blueBg);color:var(--blue)">External endpoint</span>':''}
      ${n.db?'<span class="tp" style="background:var(--amberBg);color:var(--amber)">Database</span>':''}
    </div>
    <div class="td">${n.d}</div>
    ${ch?`<div class="tc">${ch}</div>`:''}`;
  ttEl.classList.add('show');
  document.addEventListener('mousemove',mvTT);
  ibEl.innerHTML=`<span class="nm">${n.id}</span><span class="ds">${n.d}</span><span class="pl" style="background:${tb};color:${tc}">T${n.t}</span>`;
  if(!sel)hl(id,true);
}
function mvTT(e){let x=e.clientX+14,y=e.clientY+10;if(x+350>innerWidth)x=e.clientX-350;if(y+200>innerHeight)y=e.clientY-210;ttEl.style.left=x+'px';ttEl.style.top=y+'px';}
function hOut(){ttEl.classList.remove('show');document.removeEventListener('mousemove',mvTT);if(!sel)clrHL();}

/* ── CLICK ── */
function ck(id){if(sel===id){clr();return;}sel=id;hl(id,false);}
function clr(){sel=null;clrHL();ibEl.innerHTML='<span class="ht">Hover a service for details · Click to lock highlight · Esc to reset · Scroll to zoom · Drag to pan</span>';}

/* ── HIGHLIGHT ── */
function hl(id,soft){
  const conn=new Set([id]);
  (adj[id]?.o||new Set()).forEach(n=>conn.add(n));
  (adj[id]?.i||new Set()).forEach(n=>conn.add(n));
  document.querySelectorAll('.nd').forEach(el=>{
    const nid=el.dataset.id;
    el.classList.toggle('hl',conn.has(nid));
    el.style.opacity=conn.has(nid)?'1':soft?'.3':'.12';
  });
  document.querySelectorAll('#EG line').forEach(ln=>{
    const f=ln.dataset.f,t=ln.dataset.t,c=(f===id||t===id);
    if(c){
      const isOut=f===id;
      ln.setAttribute('stroke',isOut?'var(--purple)':'var(--green)');
      ln.setAttribute('stroke-width','2');
      ln.setAttribute('opacity','.9');
    } else {
      ln.setAttribute('stroke','var(--t3)');
      ln.setAttribute('stroke-width','.4');
      ln.setAttribute('opacity',soft?'.08':'.04');
    }
  });
}
function clrHL(){
  document.querySelectorAll('.nd').forEach(el=>{el.classList.remove('hl');el.style.opacity='';});
  document.querySelectorAll('#EG line').forEach(ln=>{ln.setAttribute('stroke','var(--t3)');ln.setAttribute('stroke-width','.7');ln.setAttribute('opacity','.28');});
}

/* ── PAN & ZOOM ── */
function apply(){cvs.style.transform=`translate(${px}px,${py}px) scale(${sc})`;}
function zm(f){sc=Math.max(.25,Math.min(3.5,sc*f));apply();}
function fit(){
  const ww=W_el.clientWidth,wh=W_el.clientHeight;
  sc=Math.min(ww/1040,wh/690)*.93;
  px=(ww-1040*sc)/2;py=(wh-690*sc)/2;apply();
}
W_el.onmousedown=e=>{if(e.target.closest('.nd'))return;drag=true;lx=e.clientX;ly=e.clientY;};
onmousemove=e=>{if(!drag)return;px+=e.clientX-lx;py+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply();};
onmouseup=()=>drag=false;
W_el.addEventListener('wheel',e=>{e.preventDefault();const r=W_el.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,ps=sc;sc*=e.deltaY<0?1.1:1/1.1;sc=Math.max(.25,Math.min(3.5,sc));px=mx-(mx-px)*sc/ps;py=my-(my-py)*sc/ps;apply();},{passive:false});

// Touch
let ld=0,ltx,lty;
W_el.ontouchstart=e=>{if(e.touches.length===1){drag=true;ltx=e.touches[0].clientX;lty=e.touches[0].clientY;}if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);};
W_el.ontouchmove=e=>{if(e.touches.length===1&&drag){px+=e.touches[0].clientX-ltx;py+=e.touches[0].clientY-lty;ltx=e.touches[0].clientX;lty=e.touches[0].clientY;apply();}if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(ld){sc*=d/ld;sc=Math.max(.25,Math.min(3.5,sc));apply();}ld=d;}};
W_el.ontouchend=()=>{drag=false;ld=0;};

onkeydown=e=>{if(e.key==='Escape')clr();if(e.key==='+'||e.key==='=')zm(1.2);if(e.key==='-')zm(1/1.2);if(e.key==='0')fit();};
onresize=fit;

render();
</script>
</body>
</html>
